en:{p1:"Blog",p2:"Loading...",p3:"Loading content...",p4:"16 years of field expertise",p5:"Free 3D preliminary design",p6:"Just let us know the site location, and we will provide satellite image analysis → optimal layout → 3D drawings, all free of charge.",p9:"Book a visit to Hwasun Showroom →",p10:"Automatic quote calculator →",p11:"Quick Consultation",p12:"Year-round reservation system in operation",p13:"Related",p14:"Article",p15:"Quicker answers than text",p16:"Meeting in person",p17:"Consult 1:1 with a 16-year expert at the Hwasun Showroom.",p18:"Showroom visit booking →",p19:"Home",p20:"Share",p21:"Copy URL",p22:"Post not found",p23:"This post does not exist.",p24:"Return to Blog List",cat_all:"All",cat_startup:"Startup Guide",cat_construction:"Construction technology",cat_trend:"Trends",cat_revenue:"Profit Analysis",cat_permit:"Permits and Approvals",cat_case:"Case Studies",bt1:"How to Save 30 Million Won in Civil Engineering Costs for Novice Entrepreneurs",bt2:"Zero Distribution Margin: Why Direct Construction from Our Domestic Factory is 30% Cheaper",bt3:"Extreme environment resistant to -20°C · Winter-specialized profit-generating: The principle of 4-layer insulation system",bt4:"Weldless patented joint technology that withstands typhoons (160km/h)",bt5:"Say Goodbye to Refugee Camps: The Golden Ratio of 80 pyeong per unit that triples customer value",bt6:"Essential Checklist for Campsite Permits and Approvals Even Real Estate Agents Don't Tell You About",bt7:"Why you must get a 3D preliminary design at the Hwasun O4O Showroom",bt8:"WOCS Profit-Sharing Partnership Proposal for Idle Landowners",bt9:"Large resort and local government B2B large-scale glamping planning strategy",bt10:"15-year tent lifespan guarantee: Frame material and canvas management know-how",be1:"The core reason for glamping startup failure is not glamping itself, but civil engineering. Drainage, electricity, water & sewage — a practical guide to preventing unexpected civil engineering cost overruns.",be2:"We haven't lowered the quality. This is because we've completely eliminated unnecessary intermediate distribution steps. We transparently disclose WOCS's cost structure.",be3:"Winter is not the off-season. With WOCS's 4-layer aluminum foil bubble + canvas insulation system, indoor temperatures remain above 20 degrees Celsius even at -20 degrees Celsius. We reveal the principles and structure.",be4:"Welding is vulnerable to thermal deformation and fatigue failure. WOCS's double-wedge pressing method doubles durability and halves construction time with just bolts. We reveal the core of our patented technology.",be5:"Is profit higher if you pack in 10 units? Quite the opposite. We prove with numbers why 5 units × 350,000 KRW generates higher total revenue and review scores than 10 units × 120,000 KRW.",be6:"There are countless cases of losing deposits without verifying land use zoning. We disclose an essential permit and license checklist to confirm before signing a contract: campsite business registration, fire safety, and environmental regulations.",be7:"Will you decide on tens of millions of won just by looking at a few photos? We explain why touching the actual product at the Hwasun showroom and collaboratively drawing 3D blueprints with Fusion 360 is essential.",be8:"Have good land but no capital? WOCS explains its O4O joint venture model, where WOCS invests construction technology and capital, and the landowner provides the site to share revenue.",be9:"We reveal how WOCS's direct factory delivery from its domestic factory achieves 30-40% cost reduction in large-scale complexes of over 3,000 pyeong and local government tourism consignment projects, showcasing our B2B strategy.",be10:"6063-T5 aluminum alloy frames can be used for over 15 years. However, without proper management, they can rust in just 3 years. We reveal practical management tips to extend the lifespan of your frame and canvas."},
ja:{p1:"ブログ",p2:"読み込み中...",p3:"コンテンツを読み込み中です...",p4:"16年の現場専門家の",p5:"無料3D仮設計",p6:"敷地の場所をお知らせいただくだけで、衛星写真分析 → 最適な配置 → 3D図面まで無料で提供します。",p9:"和順ショールーム訪問予約 →",p10:"自動見積もり計算機 →",p11:"迅速な相談",p12:"年中予約制で運営",p13:"関連",p14:"記事",p15:"文字よりも早い回答は",p16:"直接会うこと",p17:"和順ショールームで16年の専門家と1対1でご相談ください。",p18:"ショールーム訪問予約 →",p20:"共有する",p21:"URLをコピー",p22:"投稿が見つかりません",p23:"存在しない記事です。",p24:"ブログリストに戻る",cat_all:"全て",cat_startup:"起業ガイド",cat_construction:"施工技術",cat_trend:"トレンド",cat_revenue:"収益分析",cat_permit:"許認可",cat_case:"事例",bt1:"初心者起業家のための土木工事費3,000万ウォンを削減する方法",bt2:"流通マージンゼロ：国内自社工場ダイレクト施工が30％安い理由",bt3:"-20℃に耐える極限環境・冬季特化収益型：4層断熱システムの原理",bt4:"台風(160km/h)にもびくともしない無溶接特許ジョイント技術",bt5:"難民キャンプはもう終わり：客単価を3倍にする1棟あたり80坪の黄金比",bt6:"不動産業者も教えてくれないキャンプ場許認可必須チェックリスト",bt7:"和順O4Oショールームで3D仮設計を必ず受けるべき理由",bt8:"遊休地所有者向けWOCS収益共有パートナーシップ提案",bt9:"大規模リゾートおよび地方自治体向けB2B大規模グランピング企画戦略",bt10:"テント寿命15年保証：フレーム素材とキャンバス管理ノウハウ",be1:"グランピング事業失敗の核心的な原因はグランピング自体ではなく、土木工事にあります。排水・電気・上下水道 — 予期せぬ土木工事費の爆発を防ぐ実践ガイド。",be2:"品質を落としたわけではありません。不必要な中間流通段階を完全に排除したからです。WOCSの原価構造を透明に公開します。",be3:"冬はオフシーズンではありません。WOCSの4層アルミホイルバブル＋キャンバス断熱システムで、マイナス20度でも室内は20度以上。その原理と構造を公開します。",be4:"溶接は熱変形や疲労破壊に脆弱です。WOCSの二重くさび加圧方式は、ボルトだけで耐久性2倍、施工時間半分。特許技術の核心を公開します。",be5:"10棟をぎっしり詰め込むと利益が高い？正反対です。5棟 × 35万ウォンが、10棟 × 12万ウォンよりも総売上もレビュー評価も高い理由を数字で証明します。",be6:"用途地域を確認せずに契約金を失った事例が数多くあります。キャンプ場事業登録、消防、環境 — 契約前に必ず確認すべき許認可チェックリストを公開します。",be7:"数枚の写真を見て数千万ウォンを決定しますか？和順ショールームで実物に触れて、Fusion 360で3D図面を一緒に描くプロセスがなぜ必須なのかを説明します。",be8:"良い土地はあるが資金がない？WOCSが施工技術と資本を投資し、地主が敷地を提供して売上を分けるO4O合弁モデルを説明します。",be9:"3,000坪以上の大規模団地、自治体の観光委託事業において、WOCSの国内自社工場からの直送がどのように30～40%の原価を削減するのか、そのB2B戦略を公開します。",be10:"6063-T5アルミニウム合金フレームは15年以上使用可能です。しかし、管理を知らなければ3年で錆びてしまいます。フレームとキャンバスを長持ちさせる実践的な管理法を公開します。"},

es:{p1:"Blog",p2:"Cargando...",p3:"Cargando contenido...",p4:"16 años de experiencia en el campo",p5:"Diseño preliminar 3D gratuito",p6:"Simplemente indíquenos la ubicación del sitio, y le proporcionaremos análisis de imágenes satelitales → diseño óptimo → planos 3D, todo de forma gratuita.",p9:"Reservar visita al showroom de Hwasun →",p10:"Calculadora de presupuesto automática →",p11:"Consulta rápida",p12:"Operación con sistema de reservas durante todo el año",p13:"Relacionado",p14:"Artículo",p15:"Una respuesta más rápida que un texto",p16:"Reunión en persona",p17:"Consulte 1:1 con un experto de 16 años de experiencia en el Showroom de Hwasun.",p18:"Reserva de visita al showroom →",p20:"Compartir",p21:"Copiar URL",p22:"No se encontró la publicación",p23:"Esta publicación no existe.",p24:"Volver a la lista del blog",cat_all:"Todo",cat_startup:"Guía de inicio",cat_construction:"Tecnología de construcción",cat_trend:"Tendencias",cat_revenue:"Análisis de ganancias",cat_permit:"Permisos y aprobaciones",cat_case:"Casos de Estudio",bt1:"Cómo ahorrar 30 millones de wones en costes de ingeniería civil para emprendedores novatos",bt2:"Margen de distribución cero: por qué la construcción directa desde nuestra fábrica nacional es un 30% más barata",bt3:"Resistente a entornos extremos de -20°C · Rentable y especializado para invierno: El principio del sistema de aislamiento de 4 capas",bt4:"Tecnología de junta patentada sin soldadura que resiste tifones (160km/h)",bt5:"Adiós a los campos de refugiados: La proporción áurea de 80 pyeong por unidad que triplica el valor del cliente",bt6:"Lista de verificación esencial para permisos y aprobaciones de campamentos que ni siquiera los agentes inmobiliarios te cuentan",bt7:"Por qué debe obtener un diseño preliminar en 3D en la sala de exposición O4O de Hwasun",bt8:"Propuesta de Asociación de Reparto de Beneficios de WOCS para Propietarios de Terrenos Ociosos",bt9:"Estrategia de planificación de glamping a gran escala B2B para grandes resorts y gobiernos locales",bt10:"Garantía de vida útil de la tienda de 15 años: Conocimientos sobre el material del marco y el mantenimiento de la lona",be1:"La razón principal del fracaso de un negocio de glamping no es el glamping en sí, sino la ingeniería civil. Drenaje, electricidad, agua y alcantarillado: una guía práctica para prevenir gastos inesperados en obras civiles.",be2:"No hemos bajado la calidad. Esto se debe a que hemos eliminado por completo los pasos de distribución intermedios innecesarios. Divulgamos de forma transparente la estructura de costos de WOCS.",be3:"El invierno no es temporada baja. Con el sistema de aislamiento de burbujas de papel de aluminio de 4 capas + lona de WOCS, las temperaturas interiores se mantienen por encima de los 20 grados Celsius incluso a -20 grados Celsius. Revelamos los principios y la estructura.",be4:"La soldadura es vulnerable a la deformación térmica y la falla por fatiga. El método de prensado de doble cuña de WOCS duplica la durabilidad y reduce a la mitad el tiempo de construcción con solo pernos. Revelamos el núcleo de nuestra tecnología patentada.",be5:"¿Es más rentable si se instalan 10 unidades apiñadas? Todo lo contrario. Demostramos con cifras por qué 5 unidades × 350.000 KRW generan mayores ingresos totales y puntuaciones de reseñas que 10 unidades × 120.000 KRW.",be6:"Hay innumerables casos de pérdida de depósitos sin verificar la zonificación del uso del suelo. Revelamos una lista de verificación esencial de permisos y licencias para confirmar antes de firmar un contrato: registro de actividad de camping, seguridad contra incendios y normativas medioambientales.",be7:"¿Decidirá decenas de millones de wones solo mirando algunas fotos? Explicamos por qué es esencial tocar el producto real en la sala de exposición de Hwasun y dibujar colaborativamente planos en 3D con Fusion 360.",be8:"¿Tiene buen terreno pero no capital? WOCS explica su modelo de empresa conjunta O4O, donde WOCS invierte tecnología y capital de construcción, y el propietario del terreno proporciona el sitio para compartir los ingresos.",be9:"Revelamos cómo la entrega directa de WOCS desde su fábrica nacional logra una reducción de costos del 30-40% en grandes complejos de más de 3,000 pyeong y proyectos de consignación turística del gobierno local, mostrando nuestra estrategia B2B.",be10:"Los marcos de aleación de aluminio 6063-T5 se pueden usar durante más de 15 años. Sin embargo, sin una gestión adecuada, pueden oxidarse en solo 3 años. Revelamos consejos prácticos de gestión para extender la vida útil de su marco y lona."},

rs et les collectivités locales",bt10:"Garantie de 15 ans sur la durée de vie de la tente : Savoir-faire en matière de matériau de cadre et d'entretien de la toile",be1:"La raison principale de l'échec des startups de glamping n'est pas le glamping lui-même, mais le génie civil. Drainage, électricité, eau et assainissement — un guide pratique pour prévenir les dépassements inattendus des coûts d'ingénierie civile.",be2:"Nous n'avons pas baissé la qualité. C'est parce que nous avons entièrement éliminé les étapes de distribution intermédiaires inutiles. Nous divulguons de manière transparente la structure de coûts de WOCS.",be3:"L'hiver n'est pas la basse saison. Grâce au système d'isolation à 4 couches de feuille d'aluminium bullée + toile de WOCS, les températures intérieures restent supérieures à 20 degrés Celsius même à -20 degrés Celsius. Nous révélons les principes et la structure.",be4:"Le soudage est vulnérable à la déformation thermique et à la rupture par fatigue. La méthode de pressage à double coin de WOCS double la durabilité et réduit de moitié le temps de construction avec de simples boulons. Nous dévoilons l'essence de notre technologie brevetée.",be5:"Le profit est-il plus élevé si l'on entasse 10 unités ? C'est tout le contraire. Nous prouvons par les chiffres pourquoi 5 unités × 350 000 KRW génèrent des revenus totaux et des scores d'avis plus élevés que 10 unités × 120 000 KRW.",be6:"D'innombrables cas de pertes d'acomptes ont lieu sans vérification du zonage d'utilisation des terres. Nous divulguons une liste de contrôle essentielle des permis et licences à vérifier impérativement avant de signer un contrat : enregistrement d'activité de camping, sécurité incendie et réglementations environnementales.",be7:"Allez-vous décider de dizaines de millions de wons en ne regardant que quelques photos ? Nous expliquons pourquoi il est essentiel de toucher le produit réel au showroom de Hwasun et de dessiner des plans 3D en collaboration avec Fusion 360.",be8:"Vous avez un bon terrain mais pas de capital ? WOCS vous explique son modèle de coentreprise O4O, où WOCS investit la technologie de construction et le capital, et le propriétaire foncier fournit le site pour partager les revenus.",be9:"Nous révélons comment la livraison directe de WOCS depuis son usine nationale permet de réduire les coûts de 30 à 40 % dans les grands complexes de plus de 3 000 pyeong et les projets de concession touristique des gouvernements locaux, en présentant notre stratégie B2B.",be10:"Les cadres en alliage d'aluminium 6063-T5 peuvent être utilisés pendant plus de 15 ans. Cependant, sans une gestion adéquate, ils peuvent rouiller en seulement 3 ans. Nous vous révélons des astuces de gestion pratiques pour prolonger la durée de vie de votre cadre et de votre toile."},

Glamping-Startups ist nicht Glamping selbst, sondern der Tiefbau. Entwässerung, Strom, Wasser und Abwasser – ein praktischer Leitfaden zur Vermeidung unerwarteter Tiefbaukostenexplosionen.",be2:"Wir haben die Qualität nicht gesenkt. Das liegt daran, dass wir unnötige Zwischenvertriebsstufen vollständig eliminiert haben. Wir legen die Kostenstruktur von WOCS transparent offen.",be3:"Der Winter ist keine Nebensaison. Mit dem 4-lagigen Aluminiumfolien-Blasen- + Canvas-Isolationssystem von WOCS bleiben die Innentemperaturen selbst bei -20 Grad Celsius über 20 Grad Celsius. Wir enthüllen die Prinzipien und die Struktur.",be4:"Schweißverbindungen sind anfällig für thermische Verformungen und Ermüdungsbrüche. Die doppelte Keildruckmethode von WOCS verdoppelt die Haltbarkeit und halbiert die Bauzeit mit nur Schrauben. Wir enthüllen den Kern unserer patentierten Technologie.",be5:"Ist der Gewinn höher, wenn man 10 Einheiten dicht gedrängt platziert? Ganz im Gegenteil. Wir beweisen mit Zahlen, warum 5 Einheiten × 350.000 KRW höhere Gesamtumsätze und bessere Bewertungen erzielen als 10 Einheiten × 120.000 KRW.",be6:"Es gibt unzählige Fälle, in denen Anzahlungen verloren gingen, weil die Landnutzungszonierung nicht überprüft wurde. Wir veröffentlichen eine wesentliche Checkliste für Genehmigungen und Lizenzen, die vor Vertragsunterzeichnung unbedingt zu überprüfen ist: Registrierung als Campingplatzbetreiber, Brandschutz und Umweltauflagen.",be7:"Werden Sie sich anhand weniger Fotos für zig Millionen Won entscheiden? Wir erklären, warum es unerlässlich ist, das tatsächliche Produkt im Hwasun-Showroom zu berühren und gemeinsam 3D-Pläne mit Fusion 360 zu erstellen.",be8:"Sie haben gutes Land, aber kein Kapital? WOCS erklärt sein O4O-Joint-Venture-Modell, bei dem WOCS Bautechnologie und Kapital investiert und der Grundstückseigentümer das Gelände zur Umsatzbeteiligung zur Verfügung stellt.",be9:"Wir enthüllen, wie WOCS's Direktlieferung ab Werk aus der heimischen Fabrik eine Kostenreduzierung von 30-40% bei Großanlagen von über 3.000 Pyeong und Tourismus-Auftragsprojekten der Kommunalverwaltung erzielt, und präsentieren unsere B2B-Strategie.",be10:"6063-T5 Aluminiumlegierungsrahmen können über 15 Jahre verwendet werden. Ohne entsprechende Pflege können sie jedoch bereits nach 3 Jahren rosten. Wir verraten praktische Management-Tipps, um die Lebensdauer Ihres Rahmens und Ihrer Plane zu verlängern."},

e 15 anos: Conhecimento sobre material da estrutura e gerenciamento da lona",be1:"A principal razão para o fracasso de startups de glamping não é o glamping em si, mas a engenharia civil. Drenagem, eletricidade, água e esgoto — um guia prático para prevenir estouros inesperados nos custos de engenharia civil.",be2:"Não diminuímos a qualidade. Isso ocorre porque eliminamos completamente as etapas desnecessárias de distribuição intermediária. Divulgamos de forma transparente a estrutura de custos da WOCS.",be3:"O inverno não é a baixa temporada. Com o sistema de isolamento de bolhas de folha de alumínio de 4 camadas + lona da WOCS, as temperaturas internas permanecem acima de 20 graus Celsius mesmo a -20 graus Celsius. Revelamos os princípios e a estrutura.",be4:"A soldagem é vulnerável à deformação térmica e à falha por fadiga. O método de compressão de cunha dupla da WOCS dobra a durabilidade e reduz o tempo de construção pela metade, usando apenas parafusos. Revelamos o cerne de nossa tecnologia patenteada.",be5:"O lucro é maior se você lotar 10 unidades? Pelo contrário. Provamos com números por que 5 unidades × 350.000 KRW geram maior receita total e pontuações de avaliação do que 10 unidades × 120.000 KRW.",be6:"Há inúmeros casos de perda de depósitos sem verificar o zoneamento de uso do solo. Divulgamos uma lista de verificação essencial de licenças e alvarás a confirmar antes de assinar um contrato: registo de negócio de parque de campismo, segurança contra incêndios e regulamentações ambientais.",be7:"Você decidirá dezenas de milhões de won apenas olhando algumas fotos? Explicamos por que é essencial tocar o produto real no showroom de Hwasun e desenhar em conjunto plantas 3D com o Fusion 360.",be8:"Tem um bom terreno, mas sem capital? A WOCS explica o seu modelo de joint venture O4O, onde a WOCS investe tecnologia de construção e capital, e o proprietário do terreno fornece o local para partilha de receitas.",be9:"Revelamos como a entrega direta da WOCS a partir da sua fábrica nacional alcança uma redução de custos de 30-40% em grandes complexos de mais de 3.000 pyeong e projetos de consignação de turismo do governo local, mostrando a nossa estratégia B2B.",be10:"As estruturas de liga de alumínio 6063-T5 podem ser usadas por mais de 15 anos. No entanto, sem o gerenciamento adequado, podem enferrujar em apenas 3 anos. Revelamos dicas práticas de gerenciamento para estender a vida útil de sua estrutura e lona."},

 grandi resort e enti governativi locali",bt10:"Garanzia di 15 anni sulla durata della tenda: Materiale del telaio e know-how sulla gestione della tela",be1:"La causa principale del fallimento delle startup di glamping non è il glamping in sé, ma l'ingegneria civile. Drenaggio, elettricità, acqua e fognature — una guida pratica per prevenire esplosioni inaspettate dei costi di ingegneria civile.",be2:"Non abbiamo abbassato la qualità. Ciò è dovuto al fatto che abbiamo eliminato completamente le fasi di distribuzione intermedie non necessarie. Riveliamo in modo trasparente la struttura dei costi di WOCS.",be3:"L'inverno non è la bassa stagione. Con il sistema di isolamento a 4 strati di bolle di foglio di alluminio + tela di WOCS, le temperature interne rimangono sopra i 20 gradi Celsius anche a -20 gradi Celsius. Riveliamo i principi e la struttura.",be4:"La saldatura è vulnerabile alla deformazione termica e alla rottura per fatica. Il metodo di pressatura a doppia cuneo di WOCS raddoppia la durabilità e dimezza i tempi di costruzione utilizzando solo bulloni. Riveliamo il cuore della nostra tecnologia brevettata.",be5:"Il profitto è più alto se si ammassano 10 unità? Tutto il contrario. Dimostriamo con i numeri perché 5 unità × 350.000 KRW generano entrate totali e punteggi di recensione più elevati rispetto a 10 unità × 120.000 KRW.",be6:"Sono innumerevoli i casi di perdita di depositi senza verificare la zonizzazione d'uso del suolo. Riveliamo una checklist essenziale di permessi e licenze da verificare obbligatoriamente prima di firmare un contratto: registrazione dell'attività di campeggio, sicurezza antincendio e normative ambientali.",be7:"Deciderai su decine di milioni di won solo guardando alcune foto? Spieghiamo perché toccare il prodotto reale nello showroom di Hwasun e disegnare collaborativamente progetti 3D con Fusion 360 è essenziale.",be8:"Hai un buon terreno ma nessun capitale? WOCS spiega il suo modello di joint venture O4O, in cui WOCS investe tecnologia di costruzione e capitale, e il proprietario terriero fornisce il sito per condividere i ricavi.",be9:"Sveliamo come la consegna diretta di WOCS dalla sua fabbrica nazionale raggiunge una riduzione dei costi del 30-40% in grandi complessi di oltre 3.000 pyeong e progetti di appalto turistico degli enti locali, mostrando la nostra strategia B2B.",be10:"I telai in lega di alluminio 6063-T5 possono essere utilizzati per oltre 15 anni. Tuttavia, senza una gestione adeguata, possono arrugginire in soli 3 anni. Riveliamo consigli pratici di gestione per prolungare la vita utile del telaio e del telo."},
ar:{p1:"المدونة",p2:"جار التحميل...",p3:"جارٍ تحميل المحتوى...",p4:"16 عامًا من الخبرة الميدانية",p5:"تصميم ثلاثي الأبعاد أولي مجاني",p6:"فقط أخبرنا بموقع الأرض، وسنوفر لك تحليل صور الأقمار الصناعية → التخطيط الأمثل → رسومات ثلاثية الأبعاد، كل ذلك مجانًا.",p9:"احجز زيارة لغرفة عرض هواسون →",p10:"حاسبة عروض الأسعار التلقائية →",p11:"استشارة سريعة",p12:"نظام حجز على مدار العام",p13:"ذو صلة",p14:"مقال",p15:"إجابات أسرع من المراسلات الكتابية",p16:"مقابلة شخصية",p17:"استشر 1:1 مع خبير لديه 16 عامًا من الخبرة في صالة عرض هواسون.",p18:"حجز زيارة صالة العرض ←",p20:"مشاركة",p21:"نسخ الرابط",p22:"لم يتم العثور على المنشور",p23:"هذا المنشور غير موجود.",p24:"العودة إلى قائمة المدونة",cat_all:"الكل",cat_startup:"دليل ريادة الأعمال",cat_construction:"تقنية البناء",cat_trend:"الاتجاهات",cat_revenue:"تحليل الأرباح",cat_permit:"التصاريح والموافقات",cat_case:"دراسات حالة",bt1:"كيفية توفير 30 مليون وون من تكاليف الهندسة المدنية لرواد الأعمال المبتدئين",bt2:"هامش توزيع صفري: لماذا البناء المباشر من مصنعنا المحلي أرخص بنسبة 30%",bt3:"مقاومة للبيئات القاسية حتى -20 درجة مئوية · مربحة ومتخصصة للشتاء: مبدأ نظام العزل رباعي الطبقات",bt4:"تقنية وصلة مُسجلة ببراءة اختراع بدون لحام تصمد أمام الأعاصير (160 كم/ساعة)",bt5:"وداعاً لمخيمات اللاجئين: النسبة الذهبية 80 بيونغ لكل وحدة التي تضاعف قيمة العميل ثلاثة أضعاف",bt6:"قائمة التحقق الأساسية لتراخيص وموافقات المخيمات التي لا يخبرك بها حتى وكلاء العقارات",bt7:"لماذا يجب عليك الحصول على تصميم أولي ثلاثي الأبعاد في معرض هواسون O4O",bt8:"اقتراح شراكة تقاسم الأرباح من WOCS لأصحاب الأراضي الخاملة",bt9:"استراتيجية تخطيط التخييم الفاخر B2B للمنتجعات الكبيرة والمشاريع الحكومية المحلية الكبرى",bt10:"ضمان عمر الخيمة 15 عامًا: معرفة إدارة مادة الإطار والقماش المشمع",be1:"السبب الأساسي لفشل مشاريع التخييم الفاخر ليس التخييم الفاخر بحد ذاته، بل الهندسة المدنية. الصرف الصحي، الكهرباء، المياه والصرف الصحي — دليل عملي لمنع الزيادات غير المتوقعة في تكاليف الهندسة المدنية.",be2:"لم نخفض الجودة. هذا لأننا أزلنا تمامًا خطوات التوزيع الوسيطة غير الضرورية. نكشف بشفافية عن هيكل تكلفة WOCS.",be3:"الشتاء ليس موسمًا ركودًا. بفضل نظام العزل المكون من 4 طبقات من فقاعات رقائق الألومنيوم + قماش الكانفاس من WOCS، تظل درجات الحرارة الداخلية فوق 20 درجة مئوية حتى عند -20 درجة مئوية. نكشف عن المبادئ والهيكل.",be4:"اللحام عرضة للتشوه الحراري وانهيار الإجهاد. طريقة الضغط الإسفيني المزدوجة من WOCS تضاعف المتانة وتخفض وقت البناء إلى النصف باستخدام البراغي فقط. نكشف عن جوهر تقنيتنا الحاصلة على براءة اختراع.",be5:"هل تزداد الأرباح إذا قمت بملء 10 وحدات بكثافة؟ العكس تمامًا. نثبت بالأرقام لماذا 5 وحدات × 350,000 وون كوري تحقق إيرادات إجمالية وتقييمات أعلى من 10 وحدات × 120,000 وون كوري.",be6:"هناك حالات لا حصر لها من فقدان الودائع دون التحقق من تقسيم استخدام الأراضي. نكشف عن قائمة مراجعة أساسية للتصاريح والتراخيص يجب تأكيدها قبل توقيع العقد: تسجيل أعمال المخيم، السلامة من الحرائق، واللوائح البيئية.",be7:"هل ستقرر بشأن عشرات الملايين من الوون بمجرد النظر إلى بضع صور؟ نشرح لماذا من الضروري لمس المنتج الفعلي في صالة عرض هواسون، ورسم المخططات ثلاثية الأبعاد بالتعاون مع Fusion 360.",be8:"لديك أرض جيدة ولكن ليس لديك رأس مال؟ تشرح WOCS نموذجها للمشاريع المشتركة O4O، حيث تستثمر WOCS في تكنولوجيا البناء ورأس المال، ويقدم مالك الأرض الموقع لتقاسم الإيرادات.",be9:"نكشف كيف تحقق WOCS تخفيضًا في التكاليف بنسبة 30-40% من خلال التسليم المباشر من مصنعها المحلي في المجمعات الكبيرة التي تزيد مساحتها عن 3000 بيونغ ومشاريع تفويض السياحة للحكومات المحلية، ونعرض استراتيجيتنا B2B.",be10:"يمكن استخدام إطارات سبائك الألومنيوم 6063-T5 لأكثر من 15 عامًا. ومع ذلك، بدون إدارة مناسبة، يمكن أن تصدأ في 3 سنوات فقط. نكشف عن نصائح إدارية عملية لإطالة عمر الإطار والقماش المشمع."},
ru:{p1:"Блог",p2:"Загрузка...",p3:"Загрузка контента...",p4:"16 лет полевого опыта",p5:"Бесплатное 3D предварительное проектирование",p6:"Просто сообщите нам местоположение участка, и мы бесплатно предоставим анализ спутниковых снимков → оптимальную планировку → 3D-чертежи.",p9:"Забронировать посещение шоурума Hwasun →",p10:"Автоматический калькулятор сметы →",p11:"Быстрая консультация",p12:"Круглогодичная система бронирования",p13:"Связанные",p14:"Статья",p15:"Быстрый ответ, чем текст",p16:"Личная встреча",p17:"Получите индивидуальную консультацию с 16-летним экспертом в шоуруме Хвасун.",p18:"Запись на посещение шоурума →",p20:"Поделиться",p21:"Скопировать URL",p22:"Запись не найдена",p23:"Этот пост не существует.",p24:"Вернуться к списку блога",cat_all:"Все",cat_startup:"Руководство по запуску бизнеса",cat_construction:"Технология строительства",cat_trend:"Тренды",cat_revenue:"Анализ прибыли",cat_permit:"Разрешения и согласования",cat_case:"Примеры работ",bt1:"Как сэкономить 30 миллионов вон на гражданских строительных работах для начинающих предпринимателей",bt2:"Нулевая наценка: Почему прямые поставки с нашего отечественного завода на 30% дешевле",bt3:"Устойчивый к экстремальным условиям до -20°C · Зимний, ориентированный на прибыль: Принцип 4-слойной системы изоляции",bt4:"Бесшовная запатентованная технология соединения, выдерживающая тайфуны (160 км/ч)",bt5:"Прощайте, лагеря беженцев: Золотое соотношение 80 пхён на единицу, которое утроит ценность клиента",bt6:"Важный контрольный список для получения разрешений на кемпинг, о котором не расскажут даже риелторы",bt7:"Почему вы обязательно должны получить 3D предварительный проект в выставочном зале Hwasun O4O",bt8:"Предложение партнерства по разделению прибыли WOCS для владельцев пустующих земель",bt9:"Стратегия планирования B2B крупномасштабного глэмпинга для больших курортов и местных органов власти",bt10:"Гарантия 15 лет срока службы палатки: Ноу-хау по материалу каркаса и уходу за тентом",be1:"Основная причина неудач в глэмпинге — это не сам глэмпинг, а гражданское строительство. Водоотвод, электричество, водопровод и канализация — практическое руководство по предотвращению неожиданных перерасходов на инженерные работы.",be2:"Мы не снижали качество. Это связано с тем, что мы полностью устранили ненужные промежуточные этапы распространения. Мы прозрачно раскрываем структуру затрат WOCS.",be3:"Зима — это не мертвый сезон. Благодаря 4-слойной системе изоляции WOCS из алюминиевой фольги и брезента, температура внутри помещения остается выше 20 градусов Цельсия даже при -20 градусах Цельсия снаружи. Мы раскрываем принципы и структуру.",be4:"Сварка уязвима для термических деформаций и усталостных разрушений. Метод двойного клинового прессования WOCS удваивает долговечность и сокращает время строительства вдвое, используя только болты. Мы раскрываем суть нашей запатентованной технологии.",be5:"Будет ли выше прибыль, если плотно разместить 10 модулей? Совсем наоборот. Мы доказываем цифрами, почему 5 модулей × 350 000 KRW приносят больший общий доход и более высокие оценки, чем 10 модулей × 120 000 KRW.",be6:"Бесчисленное множество случаев потери задатков из-за непроверки зонирования землепользования. Мы раскрываем основной список разрешений и лицензий, которые необходимо обязательно проверить перед подписанием договора: регистрация бизнеса кемпинга, пожарная безопасность и экологические нормы.",be7:"Вы готовы принять решение о многомиллионных инвестициях, основываясь лишь на нескольких фотографиях? Мы объясняем, почему так важно потрогать реальный продукт в выставочном зале Хвасун и вместе разработать 3D-чертежи в Fusion 360.",be8:"Есть хорошая земля, но нет капитала? WOCS объясняет свою модель совместного предприятия O4O, при которой WOCS инвестирует строительные технологии и капитал, а землевладелец предоставляет участок для разделения прибыли.",be9:"Мы раскрываем нашу B2B-стратегию, показывая, как прямая поставка WOCS с собственного завода в Корее позволяет снизить себестоимость на 30-40% для крупных объектов площадью более 3 000 пхён и проектов по развитию туризма, порученных местными органами власти.",be10:"Рамы из алюминиевого сплава 6063-T5 могут использоваться более 15 лет. Однако без надлежащего ухода они могут заржаветь всего за 3 года. Мы раскрываем практические советы по уходу, чтобы продлить срок службы вашей рамы и тента."},
tr:{p1:"Blog",p2:"Yükleniyor...",p3:"İçerik yükleniyor...",p4:"16 yıllık saha uzmanlığı",p5:"Ücretsiz 3D ön tasarım",p6:"Sadece arazi konumunu bize bildirin, uydu görüntüsü analizi → optimum yerleşim → 3D çizimlere kadar hepsini ücretsiz olarak sağlıyoruz.",p9:"Hwasun Showroom ziyareti rezervasyonu yapın →",p10:"Otomatik fiyat teklifi hesaplayıcısı →",p11:"Hızlı Danışmanlık",p12:"Yıl boyunca rezervasyon sistemi işletimi",p13:"İlgili",p14:"Makale",p15:"Yazılıdan daha hızlı cevaplar",p16:"Yüz yüze görüşme",p17:"Hwasun Showroom'da 16 yıllık bir uzmanla 1:1 görüşme yapın.",p18:"Showroom ziyaret randevusu →",p20:"Paylaş",p21:"URL Kopyala",p22:"Gönderi bulunamadı",p23:"Bu yazı mevcut değil.",p24:"Blog listesine geri dön",cat_all:"Tümü",cat_startup:"Girişimcilik Rehberi",cat_construction:"İnşaat teknolojisi",cat_trend:"Trendler",cat_revenue:"Kar Analizi",cat_permit:"Ruhsat ve Onaylar",cat_case:"Örnekler / Vaka Çalışmaları",bt1:"Acemi Girişimciler İçin 30 Milyon Won İnşaat Maliyetinden Tasarruf Etme Yolları",bt2:"Sıfır Dağıtım Marjı: Yurtiçi Kendi Fabrikamızdan Doğrudan İnşaat Neden %30 Daha Ucuz?",bt3:"-20°C'ye dayanıklı ekstrem ortam · Kışa özel, karlı: 4 katmanlı yalıtım sisteminin prensibi",bt4:"Tayfunlara (160km/s) dayanıklı, kaynaksız patentli bağlantı teknolojisi",bt5:"Mülteci Kamplarına Elveda Deyin: Müşteri değerini üçe katlayan, bir birim başına 80 pyeong'luk Altın Oran",bt6:"Emlakçıların Bile Söylemediği Kamp Alanı Ruhsat ve Onayları İçin Temel Kontrol Listesi",bt7:"Hwasun O4O Showroom'dan neden mutlaka 3D ön tasarım almanız gerektiği",bt8:"Atıl Arazi Sahipleri İçin WOCS Kar Paylaşımı Ortaklığı Teklifi",bt9:"Büyük tatil köyleri ve yerel yönetim B2B büyük ölçekli glamping planlama stratejisi",bt10:"15 yıl çadır ömrü garantisi: Çerçeve malzemesi ve branda yönetim bilgisi",be1:"Glamping girişimlerinin başarısızlığının temel nedeni glamping'in kendisi değil, altyapı mühendisliğidir. Drenaj, elektrik, su ve kanalizasyon – beklenmedik altyapı maliyet patlamalarını önlemek için pratik bir rehber.",be2:"Kaliteyi düşürmedik. Bunun nedeni, gereksiz ara dağıtım aşamalarını tamamen ortadan kaldırmamızdır. WOCS'nin maliyet yapısını şeffaf bir şekilde açıklıyoruz.",be3:"Kış düşük sezon değildir. WOCS'nin 4 katmanlı alüminyum folyo baloncuk + kanvas yalıtım sistemi ile, -20 santigrat derecede bile iç mekan sıcaklıkları 20 santigrat derecenin üzerinde kalır. Prensip ve yapıyı açıklıyoruz.",be4:"Kaynak, termal deformasyon ve yorulma kırılmasına karşı hassastır. WOCS'nin çift kamalı basınç yöntemi, sadece cıvatalarla dayanıklılığı iki katına çıkarır ve inşaat süresini yarıya indirir. Patentli teknolojimizin özünü açıklıyoruz.",be5:"10 üniteyi sıkış tıkış yerleştirmek karı mı artırır? Tam tersi. 5 ünite × 350.000 KRW'nin neden 10 ünite × 120.000 KRW'den daha yüksek toplam gelir ve inceleme puanı sağladığını sayılarla kanıtlıyoruz.",be6:"Arazi kullanım imarını kontrol etmeden depozito kaybedilen sayısız vaka var. Kamp işletmesi tescili, yangın, çevre — sözleşme öncesinde mutlaka kontrol edilmesi gereken izin ve ruhsat kontrol listesini açıklıyoruz.",be7:"Sadece birkaç fotoğrafa bakarak on milyonlarca wona karar mı vereceksiniz? Hwasun showroom'da gerçek ürüne dokunmanın ve Fusion 360 ile birlikte 3D çizimler yapma sürecinin neden gerekli olduğunu açıklıyoruz.",be8:"İyi bir arsanız var ama sermayeniz mi yok? WOCS, inşaat teknolojisi ve sermaye yatırımı yapıp, arazi sahibinin arsayı sağlayarak geliri paylaştığı O4O ortak girişim modelini açıklıyor.",be9:"WOCS'nin yurt içi fabrikasından doğrudan teslimatının, 3.000 pyeong'dan büyük geniş arazilerde ve yerel yönetim turizm görevlendirme projelerinde maliyetleri nasıl %30-40 oranında düşürdüğünü gösteren B2B stratejimizi açıklıyoruz.",be10:"6063-T5 alüminyum alaşımlı çerçeveler 15 yıldan fazla kullanılabilir. Ancak, doğru yönetim olmazsa sadece 3 yılda paslanırlar. Çerçeve ve kanvası uzun süre kullanmanın pratik yönetim ipuçlarını açıklıyoruz."},

id:{p1:"Blog",p2:"Memuat...",p3:"Memuat konten...",p4:"16 tahun pengalaman lapangan",p5:"Desain awal 3D gratis",p6:"Cukup beritahu kami lokasi situsnya, dan kami akan menyediakan analisis citra satelit → tata letak optimal → gambar 3D, semuanya gratis.",p9:"Pesan Kunjungan ke Showroom Hwasun →",p10:"Kalkulator penawaran otomatis →",p11:"Konsultasi Cepat",p12:"Sistem reservasi sepanjang tahun",p13:"Terkait",p14:"Artikel",p15:"Jawaban lebih cepat daripada tulisan",p16:"Bertemu langsung",p17:"Konsultasi 1:1 dengan pakar berpengalaman 16 tahun di Showroom Hwasun.",p18:"Pemesanan kunjungan showroom →",p20:"Bagikan",p21:"Salin URL",p22:"Kiriman tidak ditemukan",p23:"Posting ini tidak ada.",p24:"Kembali ke Daftar Blog",cat_all:"Semua",cat_startup:"Panduan Startup",cat_construction:"Teknologi konstruksi",cat_trend:"Tren",cat_revenue:"Analisis Keuntungan",cat_permit:"Izin dan Persetujuan",cat_case:"Studi Kasus",bt1:"Cara Menghemat 30 Juta Won Biaya Teknik Sipil untuk Pengusaha Pemula",bt2:"Margin Distribusi Nol: Mengapa Konstruksi Langsung dari Pabrik Domestik Kami 30% Lebih Murah",bt3:"Tahan lingkungan ekstrem hingga -20°C · Penghasil keuntungan khusus musim dingin: Prinsip sistem insulasi 4 lapis",bt4:"Teknologi sambungan paten tanpa las yang tahan badai topan (160km/jam)",bt5:"Ucapkan Selamat Tinggal pada Kamp Pengungsian: Rasio Emas 80 pyeong per unit yang melipatgandakan nilai pelanggan tiga kali lipat",bt6:"Daftar Periksa Esensial untuk Izin dan Persetujuan Perkemahan yang Bahkan Agen Properti Tidak Beri Tahu Anda",bt7:"Mengapa Anda harus mendapatkan desain awal 3D di Showroom Hwasun O4O",bt8:"Proposal Kemitraan Berbagi Keuntungan WOCS untuk Pemilik Tanah Menganggur",bt9:"Strategi perencanaan glamping skala besar B2B untuk resor besar dan pemerintah daerah",bt10:"Jaminan masa pakai tenda 15 tahun: Bahan rangka dan pengetahuan manajemen kanvas",be1:"Alasan utama kegagalan startup glamping bukanlah glamping itu sendiri, melainkan teknik sipil. Drainase, listrik, air & limbah — panduan praktis untuk mencegah pembengkakan biaya teknik sipil yang tidak terduga.",be2:"Kami tidak menurunkan kualitas. Ini karena kami telah sepenuhnya menghilangkan langkah-langkah distribusi perantara yang tidak perlu. Kami mengungkapkan struktur biaya WOCS secara transparan.",be3:"Musim dingin bukanlah musim sepi. Dengan sistem insulasi gelembung foil aluminium 4 lapis + kanvas WOCS, suhu dalam ruangan tetap di atas 20 derajat Celsius bahkan pada -20 derajat Celsius. Kami mengungkapkan prinsip dan strukturnya.",be4:"Pengelasan rentan terhadap deformasi termal dan kegagalan kelelahan. Metode penekanan baji ganda WOCS menggandakan daya tahan dan mengurangi separuh waktu konstruksi hanya dengan baut. Kami mengungkapkan inti dari teknologi paten kami.",be5:"Apakah keuntungan lebih tinggi jika Anda menjejalkan 10 unit? Justru sebaliknya. Kami membuktikan dengan angka mengapa 5 unit × 350.000 KRW menghasilkan pendapatan total dan skor ulasan yang lebih tinggi daripada 10 unit × 120.000 KRW.",be6:"Ada banyak sekali kasus kehilangan uang muka tanpa memverifikasi zonasi penggunaan lahan. Kami mengungkapkan daftar periksa izin dan lisensi penting yang wajib dikonfirmasi sebelum menandatangani kontrak: pendaftaran bisnis perkemahan, keselamatan kebakaran, dan peraturan lingkungan.",be7:"Apakah Anda akan memutuskan puluhan juta won hanya dengan melihat beberapa foto? Kami menjelaskan mengapa menyentuh produk asli di showroom Hwasun dan bersama-sama menggambar cetak biru 3D dengan Fusion 360 sangat penting.",be8:"Punya lahan bagus tapi tidak ada modal? WOCS menjelaskan model ventura bersama O4O-nya, di mana WOCS menginvestasikan teknologi konstruksi dan modal, dan pemilik tanah menyediakan lokasi untuk berbagi pendapatan.",be9:"Kami mengungkapkan bagaimana pengiriman langsung WOCS dari pabrik domestiknya mencapai pengurangan biaya 30-40% dalam kompleks skala besar lebih dari 3.000 pyeong dan proyek konsinyasi pariwisata pemerintah daerah, menunjukkan strategi B2B kami.",be10:"Rangka paduan aluminium 6063-T5 dapat digunakan selama lebih dari 15 tahun. Namun, tanpa pengelolaan yang tepat, mereka dapat berkarat hanya dalam 3 tahun. Kami mengungkapkan tips pengelolaan praktis untuk memperpanjang umur rangka dan kanvas Anda."},

ราะเราได้ขจัดขั้นตอนการจัดจำหน่ายระดับกลางที่ไม่จำเป็นออกไปโดยสมบูรณ์ เราเปิดเผยโครงสร้างต้นทุนของ WOCS อย่างโปร่งใส",be3:"ฤดูหนาวไม่ใช่ฤดูที่เงียบเหงา ด้วยระบบฉนวนกันความร้อน 4 ชั้น อะลูมิเนียมฟอยล์บับเบิล + แคนวาส ของ WOCS ทำให้อุณหภูมิภายในอาคารสูงกว่า 20 องศาเซลเซียส แม้ในอุณหภูมิติดลบ 20 องศาเซลเซียส เราจะเปิดเผยหลักการและโครงสร้าง",be4:"การเชื่อมมีความเปราะบางต่อการเสียรูปจากความร้อนและความเสียหายจากความล้า วิธีการกดลิ่มคู่ของ WOCS เพิ่มความทนทานเป็นสองเท่าและลดเวลาการก่อสร้างลงครึ่งหนึ่งด้วยการใช้สลักเกลียวเท่านั้น เราเปิดเผยหัวใจของเทคโนโลยีที่ได้รับการจดสิทธิบัตรของเรา",be5:"กำไรจะสูงขึ้นถ้าคุณอัด 10 ยูนิตเข้าไปใช่ไหม? ตรงกันข้าม เราพิสูจน์ด้วยตัวเลขว่าทำไม 5 ยูนิต × 350,000 วอน ถึงสร้างรายได้รวมและคะแนนรีวิวที่สูงกว่า 10 ยูนิต × 120,000 วอน",be6:"มีกรณีการสูญเสียเงินมัดจำจำนวนนับไม่ถ้วนโดยไม่ได้ตรวจสอบการแบ่งเขตการใช้ที่ดิน เราเปิดเผยรายการตรวจสอบใบอนุญาตที่จำเป็นซึ่งต้องยืนยันก่อนลงนามในสัญญา: การจดทะเบียนธุรกิจค่ายพักแรม, ความปลอดภัยจากอัคคีภัย และกฎระเบียบด้านสิ่งแวดล้อม",be7:"คุณจะตัดสินใจเรื่องเงินหลายสิบล้านวอนจากรูปถ่ายเพียงไม่กี่รูปเท่านั้นหรือ? เราจะอธิบายว่าทำไมการสัมผัสของจริงที่โชว์รูมฮวาซุน และการร่วมกันเขียนแบบ 3D ด้วย Fusion 360 จึงเป็นสิ่งจำเป็น",be8:"มีที่ดินที่ดีแต่ไม่มีเงินทุนใช่ไหม? WOCS อธิบายโมเดลการร่วมทุน O4O โดยที่ WOCS ลงทุนเทคโนโลยีการก่อสร้างและเงินทุน และเจ้าของที่ดินจัดหาสถานที่เพื่อแบ่งปันรายได้",be9:"เราจะเปิดเผยกลยุทธ์ B2B ของ WOCS ว่าการจัดส่งตรงจากโรงงานในประเทศของ WOCS ช่วยลดต้นทุนได้ถึง 30-40% ในโครงการขนาดใหญ่กว่า 3,000 พยอง และโครงการท่องเที่ยวที่ได้รับมอบหมายจากหน่วยงานท้องถิ่นได้อย่างไร",be10:"โครงอะลูมิเนียมอัลลอยด์ 6063-T5 สามารถใช้งานได้นานกว่า 15 ปี อย่างไรก็ตาม หากไม่มีการดูแลที่เหมาะสม อาจเป็นสนิมได้ในเวลาเพียง 3 ปี เราเปิดเผยเคล็ดลับการจัดการเชิงปฏิบัติเพื่อยืดอายุการใช้งานของโครงและผ้าใบ"}
};

<script>
(function(){
  // 1. URL에서 id 추출
  var params = new URLSearchParams(window.location.search);
  var postId = parseInt(params.get('id'));

  // 2. 데이터에서 찾기
  var post = null;
  for(var i=0; i<BLOG_POSTS.length; i++){
    if(BLOG_POSTS[i].id === postId){ post = BLOG_POSTS[i]; break; }
  }

  // 3. 못 찾으면 목록으로
  if(!post){
    var titleEl=document.getElementById('post-title');titleEl.textContent=t('p22');titleEl.removeAttribute('data-t');
    document.getElementById('post-content').innerHTML = '<p>'+t('p23')+'</p><p><a href="blog.html">'+t('p24')+'</a></p>';
    return;
  }

  // 4. 페이지에 데이터 삽입
  document.getElementById('page-title').textContent = t(post.title) + ' | WOCS ' + t('p1');
  document.getElementById('page-desc').setAttribute('content', t(post.excerpt));
  document.getElementById('post-hero').src = post.image;
  document.getElementById('post-hero').alt = t(post.title);
  document.getElementById('bc-title').textContent = t(post.title);
  document.getElementById('bc-title').removeAttribute('data-t');
  document.getElementById('post-title').textContent = t(post.title);
  document.getElementById('post-title').removeAttribute('data-t');
  document.getElementById('post-cat').textContent = t(post.category);
  document.getElementById('post-date').textContent = post.date;
  document.getElementById('post-content').innerHTML = t(post.content);

  // 5. 관련 글 (같은 카테고리 우선, 없으면 랜덤 3개)
  var related = BLOG_POSTS.filter(function(p){ return p.id !== postId && p.category === post.category; });
  if(related.length < 3){
    var others = BLOG_POSTS.filter(function(p){ return p.id !== postId && p.category !== post.category; });
    related = related.concat(others);
  }
  related = related.slice(0, 3);

  var relHtml = related.map(function(r){
    return '<a class="rel-card" href="blog-post.html?id='+r.id+'">'
      +'<img src="'+r.image+'" alt="'+t(r.title)+'" loading="lazy">'
      +'<div class="rel-card-body">'
      +'<div class="rel-card-cat">'+t(r.category)+'</div>'
      +'<div class="rel-card-title">'+t(r.title)+'</div>'
      +'</div></a>';
  }).join('');
  document.getElementById('related-posts').innerHTML = relHtml;
})();
</script>
