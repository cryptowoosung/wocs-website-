<style>
.post-layout{display:grid;grid-template-columns:1fr 340px;gap:60px;align-items:start}
.post-body{font-family:var(--font-body);font-size:16px;color:rgba(240,235,224,0.85);line-height:2.2}
.post-body h2{font-family:var(--font-serif);font-size:clamp(22px,2.5vw,30px);font-weight:400;color:var(--ivory);margin:48px 0 16px;padding-bottom:12px;border-bottom:1px solid rgba(201,169,110,0.12)}

.post-body p{margin-bottom:20px}
.post-body strong{color:var(--gold);font-weight:600}
.post-body em{color:var(--ivory);font-style:normal;font-weight:500}
.post-body img{width:100%;height:auto;margin:32px 0;filter:brightness(0.9)}
.post-body blockquote{margin:32px 0;padding:20px 24px;border-left:3px solid var(--gold);background:rgba(201,169,110,0.04);font-size:15px;color:rgba(240,235,224,0.7);line-height:2}
.post-body ul,.post-body ol{margin:16px 0 24px 20px}
.post-body li{margin-bottom:8px}
.post-body a{color:var(--gold);text-decoration:underline}
.post-body a:hover{color:var(--ivory)}
.post-meta{display:flex;gap:16px;align-items:center;margin-bottom:40px;padding-bottom:20px;border-bottom:1px solid rgba(201,169,110,0.1);flex-wrap:wrap}
.post-meta-cat{padding:4px 14px;background:rgba(201,169,110,0.1);border:1px solid rgba(201,169,110,0.2);font-family:var(--font-body);font-size:10px;letter-spacing:2px;color:var(--gold)}
.post-meta-date{font-family:var(--font-body);font-size:12px;color:rgba(240,235,224,0.4)}
.post-sidebar{position:sticky;top:100px}
.sidebar-cta{padding:32px;border:2px solid rgba(201,169,110,0.25);background:rgba(201,169,110,0.03);text-align:center;margin-bottom:24px}
.sidebar-cta h4{font-size:17px;font-weight:400;color:var(--ivory);line-height:1.4;margin:12px 0 8px}
.sidebar-cta p{font-family:var(--font-body);font-size:12px;color:rgba(240,235,224,0.55);line-height:1.8;margin-bottom:20px}
.btn-sb{display:block;padding:14px;font-family:var(--font-body);font-size:12px;letter-spacing:1px;text-align:center;text-decoration:none;transition:all .3s;margin-bottom:8px}
.btn-sb-fill{background:var(--gold);color:var(--bg)}.btn-sb-fill:hover{background:var(--ivory)}
.btn-sb-ghost{border:1px solid rgba(201,169,110,0.3);color:var(--gold)}.btn-sb-ghost:hover{background:rgba(201,169,110,0.08)}
.rel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:40px}
.rel-card{text-decoration:none;display:block;border:1px solid rgba(201,169,110,0.1);transition:all .3s}
.rel-card:hover{border-color:rgba(201,169,110,0.3);transform:translateY(-3px)}
.rel-card img{width:100%;height:160px;object-fit:cover;filter:brightness(0.85)}
.rel-card-body{padding:16px}
.rel-card-cat{font-family:var(--font-body);font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.rel-card-title{font-size:14px;color:var(--ivory);line-height:1.4}
.post-share{display:flex;gap:12px;align-items:center;margin-top:48px;padding-top:24px;border-top:1px solid rgba(201,169,110,0.1)}
.post-share span{font-family:var(--font-body);font-size:12px;color:rgba(240,235,224,0.4);letter-spacing:1px}
.share-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(201,169,110,0.2);color:var(--gold);font-size:14px;text-decoration:none;transition:all .3s}
.share-btn:hover{background:var(--gold);color:var(--bg)}
@media(max-width:1024px){.post-layout{grid-template-columns:1fr;gap:40px}.post-sidebar{position:relative;top:0}.rel-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.rel-grid{grid-template-columns:1fr}}

<script>
(function(){
  // 1. URL에서 id 추출
  var params = new URLSearchParams(window.location.search);
  var postId = parseInt(params.get('id'));

  // 2. 데이터에서 찾기
  var post = null;
  for(var i=0; i<BLOG_POSTS.length; i++){
    if(BLOG_POSTS[i].id === postId){ post = BLOG_POSTS[i]; break; }
  }

  // 3. 못 찾으면 목록으로
  if(!post){
    document.getElementById('post-title').textContent = '글을 찾을 수 없습니다';
    document.getElementById('post-content').innerHTML = '<p>존재하지 않는 글입니다. <a href="blog.html">블로그 목록으로 돌아가기</a></p>';
    return;
  }

  // 4. 페이지에 데이터 삽입
  document.getElementById('page-title').textContent = post.title + ' | WOCS 블로그';
  document.getElementById('page-desc').setAttribute('content', post.excerpt);
  document.getElementById('post-hero').src = post.image;
  document.getElementById('post-hero').alt = post.title;
  document.getElementById('bc-title').textContent = post.title;
  document.getElementById('post-title').textContent = post.title;
  document.getElementById('post-cat').textContent = post.category;
  document.getElementById('post-date').textContent = post.date;
  document.getElementById('post-content').innerHTML = post.content;

  // 5. 관련 글 (같은 카테고리 우선, 없으면 랜덤 3개)
  var related = BLOG_POSTS.filter(function(p){ return p.id !== postId && p.category === post.category; });
  if(related.length < 3){
    var others = BLOG_POSTS.filter(function(p){ return p.id !== postId && p.category !== post.category; });
    related = related.concat(others);
  }
  related = related.slice(0, 3);

  var relHtml = related.map(function(r){
    return '<a class="rel-card" href="blog-post.html?id='+r.id+'">'
      +'<img src="'+r.image+'" alt="'+r.title+'" loading="lazy">'
      +'<div class="rel-card-body">'
      +'<div class="rel-card-cat">'+r.category+'</div>'
      +'<div class="rel-card-title">'+r.title+'</div>'
      +'</div></a>';
  }).join('');
  document.getElementById('related-posts').innerHTML = relHtml;
})();
