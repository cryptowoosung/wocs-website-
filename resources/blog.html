<style>
/* Featured Carousel */
.feat-track{display:flex;gap:20px;overflow-x:auto;scroll-behavior:smooth;-ms-overflow-style:none;scrollbar-width:none;padding:8px 0}
.feat-track::-webkit-scrollbar{display:none}
.feat-card{min-width:340px;max-width:340px;flex-shrink:0;position:relative;overflow:hidden;text-decoration:none;display:block;transition:transform .3s}
.feat-card:hover{transform:translateY(-4px)}
.feat-card img{width:100%;height:220px;object-fit:cover;filter:brightness(0.7);transition:filter .4s}
.feat-card:hover img{filter:brightness(0.85)}
.feat-card .feat-overlay{position:absolute;bottom:0;left:0;right:0;padding:24px;background:linear-gradient(transparent,rgba(9,9,11,0.92))}
.feat-card .feat-cat{font-family:var(--font-body);font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.feat-card .feat-title{font-size:15px;color:var(--ivory);line-height:1.4}
.feat-card .feat-date{font-family:var(--font-body);font-size:10px;color:rgba(240,235,224,0.4);margin-top:6px}
.feat-nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:var(--gold);color:var(--bg);border:none;font-size:18px;cursor:pointer;z-index:5;transition:opacity .3s}
.feat-nav:hover{opacity:.8}

/* Filter */
.blog-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:40px;justify-content:center}
.blog-filter button{padding:8px 20px;background:transparent;border:1px solid rgba(201,169,110,0.2);color:rgba(240,235,224,0.6);font-family:var(--font-body);font-size:12px;letter-spacing:1px;cursor:pointer;transition:all .3s}
.blog-filter button:hover,.blog-filter button.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}

/* Blog Grid */
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.bg-card{text-decoration:none;display:block;overflow:hidden;border:1px solid rgba(201,169,110,0.1);transition:all .3s}
.bg-card:hover{border-color:rgba(201,169,110,0.3);transform:translateY(-4px)}
.bg-card img{width:100%;height:200px;object-fit:cover;filter:brightness(0.85);transition:filter .4s,transform .5s}
.bg-card:hover img{filter:brightness(1);transform:scale(1.03)}
.bg-card-body{padding:24px}
.bg-cat{font-family:var(--font-body);font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.bg-title{font-size:16px;color:var(--ivory);line-height:1.4;margin-bottom:8px;font-weight:400}
.bg-excerpt{font-family:var(--font-body);font-size:12px;color:rgba(240,235,224,0.55);line-height:1.8}
.bg-date{font-family:var(--font-body);font-size:10px;color:rgba(240,235,224,0.35);margin-top:12px}
.bg-readmore{font-family:var(--font-body);font-size:11px;color:var(--gold);margin-top:12px;display:inline-block;letter-spacing:1px;transition:padding-left .3s}
.bg-card:hover .bg-readmore{padding-left:6px}

/* Load More */
.blog-loadmore{display:block;margin:48px auto 0;padding:14px 56px;background:transparent;border:1px solid rgba(201,169,110,0.3);color:var(--gold);font-family:var(--font-body);font-size:12px;letter-spacing:2px;cursor:pointer;transition:all .3s}
.blog-loadmore:hover{background:var(--gold);color:var(--bg)}
.blog-loadmore:disabled{opacity:.3;cursor:default;background:transparent;color:var(--gold)}

/* Empty state */
.blog-empty{text-align:center;padding:60px 20px;font-family:var(--font-body);font-size:14px;color:rgba(240,235,224,0.4)}

@media(max-width:1024px){.blog-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.blog-grid{grid-template-columns:1fr}.feat-card{min-width:280px;max-width:280px}}

<script>
(function(){
  var PER_PAGE = 6;
  var currentCat = '전체';
  var shown = 0;

  // Featured carousel
  function renderFeatured(){
    var track = document.getElementById('featTrack');
    var featured = BLOG_POSTS.filter(function(p){return p.featured});
    track.innerHTML = featured.map(function(p){
      return '<a class="feat-card" href="blog-post.html?id='+p.id+'">'
        +'<img src="'+p.image+'" alt="'+p.title+'" loading="lazy">'
        +'<div class="feat-overlay">'
        +'<div class="feat-cat">'+p.category+'</div>'
        +'<div class="feat-title">'+p.title+'</div>'
        +'<div class="feat-date">'+p.date+'</div>'
        +'</div></a>';
    }).join('');
  }

  // Filter buttons
  function renderFilters(){
    var wrap = document.getElementById('blogFilter');
    wrap.innerHTML = BLOG_CATEGORIES.map(function(cat){
      var cls = cat === currentCat ? ' active' : '';
      return '<button class="'+cls+'" onclick="window._blogFilter(\''+cat+'\')">'+cat+'</button>';
    }).join('');
  }

  // Blog grid
  function getFiltered(){
    if(currentCat === '전체') return BLOG_POSTS;
    return BLOG_POSTS.filter(function(p){return p.category === currentCat});
  }

  function renderGrid(reset){
    if(reset) shown = 0;
    var filtered = getFiltered();
    var toShow = filtered.slice(0, shown + PER_PAGE);
    shown = toShow.length;

    var grid = document.getElementById('blogGrid');
    grid.innerHTML = toShow.map(function(p){
      return '<a class="bg-card" href="blog-post.html?id='+p.id+'">'
        +'<img src="'+p.image+'" alt="'+p.title+'" loading="lazy">'
        +'<div class="bg-card-body">'
        +'<div class="bg-cat">'+p.category+'</div>'
        +'<div class="bg-title">'+p.title+'</div>'
        +'<div class="bg-excerpt">'+p.excerpt+'</div>'
        +'<div class="bg-date">'+p.date+'</div>'
        +'<div class="bg-readmore">자세히 읽기 →</div>'
        +'</div></a>';
    }).join('');

    // Empty state
    document.getElementById('blogEmpty').style.display = toShow.length === 0 ? 'block' : 'none';

    // Load more button
    var btn = document.getElementById('blogLoadmore');
    if(shown >= filtered.length){
      btn.disabled = true;
      btn.textContent = '모든 글을 불러왔습니다';
    } else {
      btn.disabled = false;
      btn.textContent = '더보기 ('+(filtered.length - shown)+'개 남음)';
    }
  }

  // Public functions
  window._blogFilter = function(cat){
    currentCat = cat;
    renderFilters();
    renderGrid(true);
  };
  window.loadMore = function(){
    renderGrid(false);
  };

  // Init
  renderFeatured();
  renderFilters();
  renderGrid(true);
})();
