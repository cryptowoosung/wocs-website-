name: LinkedIn Auto Poster

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python linkedin_poster.py
        env:
          LI_ACCESS_TOKEN: ${{ secrets.LI_ACCESS_TOKEN }}
